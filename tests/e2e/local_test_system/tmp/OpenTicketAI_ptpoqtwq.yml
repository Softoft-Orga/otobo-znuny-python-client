Debugger:
  DebugThreshold: debug
  TestMode: '0'
Description: Webservice for 'OpenTicketAI'. Restricted to user 'otobo_user'.
FrameworkVersion: 11.0.11
Provider:
  Operation:
    ticket-create:
      Type: Ticket::TicketCreate
      Description: Creates a new ticket.
      IncludeTicketData: '1'
      MappingInbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          KeyMapExact:
            UserLogin: UserLogin
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMap:
            UserLogin:
              ValueMapRegEx:
                .*: otobo_user
      MappingOutbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
    ticket-search:
      Type: Ticket::TicketSearch
      Description: Searches for tickets based on specified criteria.
      IncludeTicketData: '0'
      MappingInbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          KeyMapExact:
            UserLogin: UserLogin
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMap:
            UserLogin:
              ValueMapRegEx:
                .*: otobo_user
      MappingOutbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
    ticket-get:
      Type: Ticket::TicketGet
      Description: Retrieves ticket information by ID.
      IncludeTicketData: '0'
      MappingInbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          KeyMapExact:
            UserLogin: UserLogin
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMap:
            UserLogin:
              ValueMapRegEx:
                .*: otobo_user
      MappingOutbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
    ticket-update:
      Type: Ticket::TicketUpdate
      Description: Updates an existing ticket.
      IncludeTicketData: '1'
      MappingInbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          KeyMapExact:
            UserLogin: UserLogin
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMap:
            UserLogin:
              ValueMapRegEx:
                .*: otobo_user
      MappingOutbound:
        Type: Simple
        Config:
          KeyMapDefault:
            MapTo: ''
            MapType: Keep
          ValueMapDefault:
            MapTo: ''
            MapType: Keep
  Transport:
    Config:
      AdditionalHeaders: null
      KeepAlive: ''
      MaxLength: '1000000'
      OutboundHeaders: {}
      RouteOperationMapping:
        ticket-create:
          Route: /tickets
          RequestMethod:
          - POST
        ticket-search:
          Route: /tickets/search
          RequestMethod:
          - POST
        ticket-get:
          Route: /tickets/:TicketId
          RequestMethod:
          - GET
        ticket-update:
          Route: /ticket-update
          RequestMethod:
          - PUT
    Type: HTTP::REST
RemoteSystem: ''
Requester:
  Transport:
    Type: ''
