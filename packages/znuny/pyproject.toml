[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "znuny"
version = "5.0.0"
description = "Python client library for the Znuny REST API"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Tobias Bück", email = "tab@softoft.de" }]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Framework :: AsyncIO",
]
dependencies = [
    "httpx>=0.27,<0.29",
    "pydantic>=2.11.3,<3",
    "python-dotenv>=1.0.1",
    "pyyaml>=6.0.2",
    "requests>=2.28,<3",
    "typer>=0.13.1,<0.20",
    "zxcvbn>=4.5.0",
]

[project.scripts]
znuny-cli = "znuny.cli:run"

[project.urls]
Homepage = "https://github.com/Softoft-Orga/otobo-znuny-python-client"
Documentation = "https://github.com/Softoft-Orga/otobo-znuny-python-client/blob/master/docs/getting-started-znuny.md"
Repository = "https://github.com/Softoft-Orga/otobo-znuny-python-client"

[tool.setuptools.packages.find]
where = ["../../src"]
include = ["znuny", "znuny.*", "otrs_gi_core", "otrs_gi_core.*"]
