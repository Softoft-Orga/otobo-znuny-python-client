name: Publish Python packages

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  publish-otobo:
    name: Publish otobo to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build otobo distribution
        run: python -m build --wheel packages/otobo
      - name: Publish otobo to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/otobo/dist

  publish-znuny:
    name: Publish znuny to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build znuny distribution
        run: python -m build --wheel packages/znuny
      - name: Publish znuny to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/znuny/dist
